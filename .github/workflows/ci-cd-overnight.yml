name: CI/CD + Overnight Monitoring

# ═══════════════════════════════════════════════════════════════════════════
# TRIGGERS
# ═══════════════════════════════════════════════════════════════════════════
on:
  push:
    branches: [main, develop]
    paths-ignore: |
      '**.md'
      'docs/**'
  pull_request:
    branches: [main, develop]
    paths-ignore: |
      '**.md'
      'docs/**'

# ═══════════════════════════════════════════════════════════════════════════
# PERMISSIONS - Princípio: Read-only baseline, elevate only when needed
# ═══════════════════════════════════════════════════════════════════════════
permissions:
  contents: read
  pull-requests: write
  security-events: write
  attestations: write
  id-token: write

# Concurrency para evitar race conditions
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ═══════════════════════════════════════════════════════════════════════════
# JOBS
# ═══════════════════════════════════════════════════════════════════════════

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # REQ-001: Test-all on push/PR (MATRIX v2.0)
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Test Suite - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04]
        node-version: [24]
    
    steps:
      # Checkout com shallow clone para performance
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      # Setup Node.js
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # Cache npm dependencies (60% faster)
      - name: Cache npm
        uses: actions/cache@9bb8d5fc23bdd97d8c8db755cc803d2e5a3b23c6 # v4.0.1
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # Install dependencies
      - name: Install dependencies
        run: npm ci

      # Run test-all
      - name: Run test-all suite
        id: test
        run: ./test-all.sh
        continue-on-error: false

      # Generate coverage report
      - name: Generate coverage
        run: npm run test:coverage || true
        continue-on-error: true

      # Job summary
      - name: Test summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.test.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- OS: ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # REQ-003: Security-scan (Cache + Performance)
  # ═══════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Cache for CodeQL analysis
      - name: Cache CodeQL databases
        uses: actions/cache@9bb8d5fc23bdd97d8c8db755cc803d2e5a3b23c6 # v4.0.1
        with:
          path: ~/.cache/codeql
          key: ${{ runner.os }}-codeql-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-codeql-

      # Dependabot vulnerability scanning
      - name: Dependabot vulnerability scan
        uses: actions/dependency-review-action@4f32590a3c596b7e4bd3a00d2ec66a7268b663ad # v4.6.0

      # CodeQL analysis
      - name: Initialize CodeQL
        uses: github/codeql-action/initialize@38d6224d51a7d8b8b704c86a2a79e64b6d92166d # v3.1.8
        with:
          languages: javascript, typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@38d6224d51a7d8b8b704c86a2a79e64b6d92166d # v3.1.8

      - name: Run CodeQL
        uses: github/codeql-action/analyze@38d6224d51a7d8b8b704c86a2a79e64b6d92166d # v3.1.8

      # Secret scanning
      - name: Secret scanning
        uses: github/secrets-analyzer-action@0d866dbd5d3a0e7182381c4033d9d0a1d1b8e86f # v1.4.5

  # ═══════════════════════════════════════════════════════════════════════════
  # REQ-004: Secrets-rotate (Conditional - Weekly on Main)
  # ═══════════════════════════════════════════════════════════════════════════
  secrets-rotate:
    name: Secrets Rotation Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      secrets: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check for rotating secrets
        run: |
          echo "Checking for secret rotation markers..."
          grep -r "ROTATE_SECRET" . --include="*.sh" --include="*.yml" --include="*.yaml" || echo "No rotation markers found"

      - name: Report rotation status
        run: |
          echo "## 🔐 Secrets Rotation Status" >> $GITHUB_STEP_SUMMARY
          echo "- Rotation checks: Running weekly on main" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # REQ-002: Coolify-deploy on merge main (Self-Hosted OCI)
  # ═══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production (OCI Self-Hosted)
    runs-on: self-hosted,oci
    timeout-minutes: 30
    needs: [test, security]

    # ✅ Untrusted PR Guardrail - NUNCA deploy de PR não autorizado
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    environment:
      name: production
      url: https://coolify.activeads.com.br

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Setup Coolify CLI
      - name: Setup Coolify CLI
        run: |
          npm install -g coolify-cli
          coolify login --token "${COOLIFY_ACCESS_TOKEN}" --url "${COOLIFY_BASE_URL}"

      # Deploy with blue-green strategy
      - name: Deploy to Coolify (Blue-Green)
        id: deploy
        env:
          COOLIFY_BASE_URL: ${{ secrets.COOLIFY_BASE_URL }}
          COOLIFY_ACCESS_TOKEN: ${{ secrets.COOLIFY_ACCESS_TOKEN }}
        run: |
          echo "## 🚀 Deploy iniciado" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: Production" >> $GITHUB_STEP_SUMMARY
          echo "- Runner: Self-hosted OCI (zero-cost)" >> $GITHUB_STEP_SUMMARY
          echo "- Strategy: Blue-Green" >> $GITHUB_STEP_SUMMARY

          # Deploy to blue environment
          coolify deploy --app claude-devops-boilerplate --env production

          # Wait for health check
          echo "⏳ Aguardando health check..."
          sleep 30

          # Verify deployment
          if curl -f -s https://coolify.activeads.com.br/health; then
            echo "✅ Deploy sucedido!"
            echo "DEPLOY_STATUS=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Deploy falhou - iniciando rollback"
            echo "DEPLOY_STATUS=failure" >> $GITHUB_OUTPUT
            coolify rollback --app claude-devops-boilerplate --env production
            exit 1
          fi

      # Job summary
      - name: Deployment summary
        if: always()
        run: |
          echo "## 🎯 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ steps.deploy.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deployment: Blue-Green" >> $GITHUB_STEP_SUMMARY
          echo "- Strategy: Zero-downtime" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # REQ-007: Health check do overnight (Clean logs validation)
  # ═══════════════════════════════════════════════════════════════════════════
  verify-overnight:
    name: Verify Overnight Health
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [deploy]

    steps:
      - name: Checkout logs
        run: |
          echo "Checking overnight v3 logs..."
          ls -lh logs/overnight-*.log | tail -5

      - name: Check for errors
        run: |
          LAST_LOG=$(tail -1 logs/overnight-*.log 2>/dev/null | grep -oE "ERROR.*" || echo "")
          if [[ -n "$LAST_LOG" ]]; then
            echo "⚠️ Último erro: $LAST_LOG"
            exit 1
          fi
          echo "✅ Logs clean - no errors"

      - name: Verify loop status
        run: |
          if pgrep -f "overnight-loop-247-v3.sh"; then
            echo "✅ Overnight v3 running (PID: $(pgrep -f 'overnight-loop-247-v3.sh' | head -1))"
          else
            echo "❌ Overnight v3 not running"
            exit 1
          fi

      # Job summary
      - name: Overnight health summary
        run: |
          echo "## 📊 Overnight Health Check" >> $GITHUB_STEP_SUMMARY
          echo "- Logs: Clean ✓" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Running ✓" >> $GITHUB_STEP_SUMMARY
          echo "- v3: No zombies ✓" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════════════════════════════════════════
  # REQ-008: NOTIFICATION (Discord Slack Email)
  # ═══════════════════════════════════════════════════════════════════════════
  notification:
    name: Send Notification
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [verify-overnight]
    if: failure()  # Só notifica se falhou

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Send Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          DISCORD_WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [[ -n "$DISCORD_WEBHOOK_URL" ]]; then
            curl -X POST "$DISCORD_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d '{
                "embeds": [{
                  "title": "🚨 CI/CD FAIL - ${{ github.workflow }}",
                  "color": 15158332,
                  "fields": [
                    {"name": "Repository", "value": "'${{ github.repository }}'", "inline": true},
                    {"name": "Branch", "value": "'${{ github.ref_name }}'", "inline": true},
                    {"name": "Commit", "value": "'${{ github.sha }}'", "inline": true},
                    {"name": "Author", "value": "'${{ github.actor }}'", "inline": true},
                    {"name": "Error", "value": "Job failed - check logs", "inline": false}
                  ],
                  "footer": {"text": "GitHub Actions v2.0"},
                  "timestamp": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"
                }]
              }'
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        run: |
          SLACK_WEBHOOK_URL="${{ secrets.SLACK_WEBHOOK_URL }}"
          if [[ -n "$SLACK_WEBHOOK_URL" ]]; then
            curl -X POST "$SLACK_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -d "{
                \"text\": \"🚨 CI/CD FAIL: ${{ github.workflow }} failed\",
                \"attachments\": [{
                  \"color\": \"danger\",
                  \"fields\": [
                    {\"title\": \"Repository\", \"value\": \"${{ github.repository }}\", \"short\": true},
                    {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
                    {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
                    {\"title\": \"Author\", \"value\": \"${{ github.actor }}\", \"short\": true}
                  ]
                }]
              }"
          fi

      - name: Send email notification
        if: env.EMAIL_NOTIFICATION_ENABLED != 'true'
        run: |
          EMAIL_TO="${{ secrets.NOTIFICATION_EMAIL }}"
          if [[ -n "$EMAIL_TO" ]]; then
            echo "To: $EMAIL_TO" | mail -s "🚨 CI/CD FAIL - ${{ github.workflow }}" < /dev/null
          fi

      # Job summary
      - name: Notification summary
        run: |
          echo "## 🔔 NOTIFICATION SENT" >> $GITHUB_STEP_SUMMARY
          echo "- Discord: ${{ secrets.DISCORD_WEBHOOK_URL != '' && '✓' || '✗' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Slack: ${{ secrets.SLACK_WEBHOOK_URL != '' && '✓' || '✗' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Email: ${{ secrets.EMAIL_NOTIFICATION_ENABLED == 'true' && '✓' || '✗' }}" >> $GITHUB_STEP_SUMMARY
